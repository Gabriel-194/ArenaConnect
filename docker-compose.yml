version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arenaconnect_db
    restart: always
    environment:
      POSTGRES_DB: arenaconnect
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
    - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arenaconnect-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/arenaconnect
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - ASAAS_MASTER_WALLET_ID=${ASAAS_MASTER_WALLET_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
      - GROQ_API_KEY=${GROQ_API_KEY}

  frontend:
    build:
      context: ./arena-connect-frontend
      dockerfile: Dockerfile
    container_name: arenaconnect-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: